<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Telemetry Session Viewer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      padding: 1rem;
      background: #111827;
      color: #f9fafb;
    }
    h1 { margin-top: 0; }
    .row {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin-bottom: 0.75rem;
    }
    .card {
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 10px;
      padding: 0.75rem;
      min-width: 220px;
    }
    label {
      display: block;
      font-size: 0.875rem;
      margin-bottom: 0.25rem;
    }
    input {
      width: 100%;
      box-sizing: border-box;
      padding: 0.5rem;
      border-radius: 8px;
      border: 1px solid #4b5563;
      background: #111827;
      color: #f9fafb;
    }
    button {
      padding: 0.6rem 1rem;
      border-radius: 8px;
      border: 0;
      cursor: pointer;
      background: #2563eb;
      color: white;
      font-weight: 600;
    }
    pre {
      background: #030712;
      border: 1px solid #374151;
      border-radius: 10px;
      padding: 1rem;
      overflow: auto;
      min-height: 300px;
    }
    .ok { color: #34d399; }
    .warn { color: #fbbf24; }
    .bad { color: #f87171; }
  </style>
</head>
<body>
  <h1>Telemetry Session Viewer</h1>

  <div class="row">
    <div class="card" style="flex: 1 1 320px;">
      <label for="server">Server base URL</label>
      <input id="server" placeholder="http://127.0.0.1:8080" />
    </div>
    <div class="card" style="flex: 1 1 220px;">
      <label for="sessionKey">Session key</label>
      <input id="sessionKey" placeholder="ABCDEFGH" />
    </div>
    <div class="card" style="display:flex;align-items:end;">
      <button id="connectButton">Connect</button>
    </div>
  </div>

  <div class="row">
    <div class="card"><strong>Status:</strong> <span id="status" class="warn">disconnected</span></div>
    <div class="card"><strong>Frames:</strong> <span id="frameCount">0</span></div>
    <div class="card"><strong>Last update:</strong> <span id="lastUpdate">never</span></div>
  </div>

  <pre id="snapshotView">{}</pre>

  <script>
    const serverInput = document.getElementById("server");
    const sessionKeyInput = document.getElementById("sessionKey");
    const connectButton = document.getElementById("connectButton");
    const statusEl = document.getElementById("status");
    const frameCountEl = document.getElementById("frameCount");
    const lastUpdateEl = document.getElementById("lastUpdate");
    const snapshotViewEl = document.getElementById("snapshotView");

    const params = new URLSearchParams(window.location.search);
    serverInput.value = params.get("server") || "http://127.0.0.1:8080";
    sessionKeyInput.value = params.get("session_key") || "";

    let socket = null;
    let frameCount = 0;

    function setStatus(text, className) {
      statusEl.textContent = text;
      statusEl.className = className;
    }

    function buildWebSocketUrl(serverBaseUrl, sessionKey) {
      const wsBase = serverBaseUrl.replace("http://", "ws://").replace("https://", "wss://").replace(/\/$/, "");
      return `${wsBase}/ws?session_key=${encodeURIComponent(sessionKey)}&role=engineer`;
    }

    function connect() {
      if (socket) {
        socket.close();
        socket = null;
      }

      const serverBaseUrl = serverInput.value.trim();
      const sessionKey = sessionKeyInput.value.trim().toUpperCase();

      if (!serverBaseUrl || !sessionKey) {
        setStatus("server and session key required", "bad");
        return;
      }

      const wsUrl = buildWebSocketUrl(serverBaseUrl, sessionKey);
      setStatus("connecting", "warn");

      socket = new WebSocket(wsUrl);

      socket.addEventListener("open", () => {
        setStatus("connected", "ok");
      });

      socket.addEventListener("message", (event) => {
        try {
          const parsed = JSON.parse(event.data);

          if (parsed && parsed.type === "telemetry_snapshot") {
            frameCount += 1;
            frameCountEl.textContent = String(frameCount);
            lastUpdateEl.textContent = new Date().toLocaleTimeString();
            snapshotViewEl.textContent = JSON.stringify(parsed.payload, null, 2);
            return;
          }

          if (parsed && parsed.type === "server_info") {
            snapshotViewEl.textContent = JSON.stringify(parsed, null, 2);
            return;
          }

          snapshotViewEl.textContent = JSON.stringify(parsed, null, 2);
        } catch {
          snapshotViewEl.textContent = event.data;
        }
      });

      socket.addEventListener("close", () => {
        setStatus("disconnected", "warn");
      });

      socket.addEventListener("error", () => {
        setStatus("error", "bad");
      });
    }

    connectButton.addEventListener("click", connect);
  </script>
</body>
</html>
